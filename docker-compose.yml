services:
  database:
    image: postgres:16
    container_name: threadforge-db
    restart: always
    environment:
      POSTGRES_USER: threadforge
      POSTGRES_PASSWORD: threadforge_password
      POSTGRES_DB: threadforge_db
    ports:
      - "5432:5432"
    volumes:
      - threadforge_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threadforge-backend
    restart: always
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://threadforge:threadforge_password@database:5432/threadforge_db
      SECRET_KEY: change_this_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  threadforge_postgres_data:
